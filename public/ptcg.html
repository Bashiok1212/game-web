<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>PTCG 个人卡牌管理</title>
  <link rel="stylesheet" href="css/cards.css">
</head>
<body>
  <div id="ptcgAuth" class="ptcg-auth-panel">
    <div class="ptcg-auth-box">
      <div class="ptcg-auth-tabs">
        <button type="button" class="ptcg-tab active" id="tabLogin" data-tab="login">登录</button>
        <button type="button" class="ptcg-tab" id="tabRegister" data-tab="register">注册</button>
      </div>
      <div id="ptcgLoginPanel">
        <h2 class="ptcg-auth-title">PTCG 管理登录</h2>
        <p class="ptcg-auth-hint">账号保存在服务器数据库，与游戏账号无关。</p>
        <form id="ptcgLoginForm" autocomplete="on">
          <div class="form-row">
            <label for="ptcgUser">用户名</label>
            <input type="text" id="ptcgUser" name="username" autocomplete="username" required maxlength="32">
          </div>
          <div class="form-row">
            <label for="ptcgPass">密码</label>
            <input type="password" id="ptcgPass" name="password" autocomplete="current-password" required maxlength="128">
          </div>
          <p id="ptcgLoginErr" class="ptcg-login-err" role="alert"></p>
          <button type="submit" class="btn btn-primary btn-block">登录</button>
        </form>
      </div>
      <div id="ptcgRegisterPanel" class="hidden">
        <h2 class="ptcg-auth-title">注册 PTCG 管理员</h2>
        <p class="ptcg-auth-hint">首个账号可直接注册；之后需在服务器设置 <code>PTCG_REGISTER_SECRET</code> 并填写下方密钥。</p>
        <form id="ptcgRegisterForm" autocomplete="on">
          <div class="form-row">
            <label for="ptcgRegUser">用户名</label>
            <input type="text" id="ptcgRegUser" maxlength="32" placeholder="3～32 位" required>
          </div>
          <div class="form-row">
            <label for="ptcgRegPass">密码</label>
            <input type="password" id="ptcgRegPass" maxlength="128" placeholder="至少 6 位" required>
          </div>
          <div class="form-row">
            <label for="ptcgRegSecret">注册密钥（可选）</label>
            <input type="password" id="ptcgRegSecret" maxlength="128" placeholder="与服务器 PTCG_REGISTER_SECRET 一致">
          </div>
          <p id="ptcgRegisterErr" class="ptcg-login-err" role="alert"></p>
          <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>
      </div>
    </div>
  </div>

  <div id="ptcgApp" class="cards-app hidden">
    <header class="cards-header cards-header-row">
      <div>
        <h1>PTCG 个人卡牌管理</h1>
        <p class="cards-sub">核心字段固定；在「编辑字段」页为语言、版本、稀有度、品相、卡状态配置下拉选项（每行一项），保存后此处会显示为下拉或手输。</p>
      </div>
      <button type="button" id="btnPtcgLogout" class="btn btn-ghost btn-sm">退出登录</button>
    </header>

    <section class="cards-toolbar">
      <input type="search" id="cardSearch" class="cards-search" placeholder="搜索编号、名称、年份、语言、版本、稀有度、状态…" autocomplete="off">
      <div class="cards-actions">
        <a href="ptcg-fields.html" class="btn btn-secondary">编辑字段</a>
        <button type="button" id="btnAddCard" class="btn btn-primary">添加卡牌</button>
        <button type="button" id="btnExport" class="btn btn-secondary">导出 JSON</button>
        <label class="btn btn-secondary btn-file">
          导入 JSON
          <input type="file" id="importFile" accept=".json,application/json" hidden>
        </label>
      </div>
    </section>

    <div id="cardFormWrap" class="card-form-wrap hidden">
      <form id="cardForm" class="card-form" autocomplete="off">
        <input type="hidden" id="editId" value="">
        <p class="card-form-no" id="cardNoHint" aria-live="polite"></p>
        <p class="card-form-shortcuts" id="formShortcutsHint">提示：<kbd>Ctrl</kbd>+<kbd>Enter</kbd> 保存并继续下一张</p>

        <div class="form-row">
          <label>名称 <span class="req">*</span></label>
          <input type="text" id="fName" required maxlength="128" placeholder="卡牌名称">
        </div>

        <div class="form-row form-row-3">
          <div class="form-cell">
            <label>年份</label>
            <input type="number" id="fYear" min="0" max="9999" step="1" placeholder="如 2024">
          </div>
          <div class="form-cell">
            <label>语言</label>
            <div class="field-control" data-slot="language"></div>
          </div>
          <div class="form-cell">
            <label>版本</label>
            <div class="field-control" data-slot="version"></div>
          </div>
        </div>

        <div class="form-row form-row-half">
          <div class="form-cell">
            <label>稀有度</label>
            <div class="field-control" data-slot="rarity"></div>
          </div>
          <div class="form-cell">
            <label>购入价（元）</label>
            <input type="number" id="fPurchasePrice" min="0" step="0.01" placeholder="0">
          </div>
        </div>

        <div class="graded-block">
          <div class="form-row form-row-graded">
            <label class="label-inline">
              <input type="checkbox" id="fGraded"> 评级卡
            </label>
          </div>
          <div id="gradedFields" class="form-row form-row-half graded-fields hidden">
            <div class="form-cell">
              <label>评级公司 <span class="req graded-req">*</span></label>
              <input type="text" id="fGradingCompany" maxlength="64" placeholder="PSA / BGS / CGC…">
            </div>
            <div class="form-cell">
              <label>评级编号 <span class="req graded-req">*</span></label>
              <input type="text" id="fGradingNumber" maxlength="64" placeholder="证书编号">
            </div>
          </div>
        </div>

        <div class="form-row form-row-half">
          <div class="form-cell">
            <label>品相</label>
            <div class="field-control" data-slot="condition"></div>
          </div>
          <div class="form-cell">
            <label>卡状态</label>
            <div class="field-control" data-slot="cardStatus"></div>
          </div>
        </div>

        <div class="form-row">
          <label>备注</label>
          <textarea id="fNotes" rows="3" maxlength="2000" placeholder="其他说明"></textarea>
        </div>

        <div class="form-row">
          <label>图片</label>
          <input type="url" id="fImageUrl" maxlength="2000" placeholder="https:// 外链（推荐）或留空">
          <p class="form-hint">或上传本地图片（建议 &lt; 400KB，将转为 Base64 存库）</p>
          <input type="file" id="fImageFile" accept="image/*" class="input-file-inline">
          <input type="hidden" id="fImage" value="">
          <div id="fImagePreview" class="image-preview hidden"></div>
          <button type="button" id="btnClearImage" class="btn btn-ghost btn-sm btn-clear-img hidden">清除图片</button>
        </div>

        <div class="form-btns">
          <button type="submit" class="btn btn-primary" id="btnSubmitCard">保存</button>
          <button type="button" class="btn btn-primary btn-save-next" id="btnSaveNext" title="保存后清空名称与备注等，保留年份/语言等便于连录">保存并继续</button>
          <button type="button" id="btnCancelForm" class="btn btn-ghost">取消</button>
        </div>
      </form>
    </div>

    <section class="cards-list-section">
      <p id="cardsEmpty" class="cards-empty">暂无卡牌，点击「添加卡牌」开始。</p>
      <ul id="cardsList" class="cards-list"></ul>
    </section>
  </div>
  <script src="js/cards-app.js"></script>
</body>
</html>
